<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REBEL AI CORE v15.3</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --red: #ff3e3e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 30px 20px; text-align: center; }
        h1 { font-size: 1.8rem; letter-spacing: 3px; text-shadow: 0 0 15px var(--neon); margin-bottom: 30px; }
        
        .mode-switch { 
            background: #111; border: 1px solid #333; padding: 15px; border-radius: 50px;
            margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; 
        }
        .mode-label { font-size: 0.9rem; font-weight: bold; }
        input[type="checkbox"] { width: 40px; height: 20px; cursor: pointer; accent-color: var(--red); }
        .rebel-text { color: var(--red); text-shadow: 0 0 8px var(--red); }

        input[type="text"] { width: 100%; padding: 18px; background: #000; border: 1px solid var(--neon); color: var(--neon); outline: none; margin-bottom: 15px; border-radius: 10px; font-size: 1rem; }
        button { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; cursor: pointer; font-weight: bold; font-size: 1.1rem; border-radius: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        button:disabled { background: #222; color: #555; }
        
        #status { font-size: 0.75rem; margin: 20px 0; min-height: 20px; letter-spacing: 1px; }
        #res-img { width: 100%; border: 1px solid var(--neon); display: none; margin-top: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>REBEL AI v15.3</h1>
        
        <div class="mode-switch">
            <span class="mode-label">SAFE</span>
            <input type="checkbox" id="rebelMode">
            <span class="mode-label rebel-text">REBEL</span>
        </div>

        <input type="text" id="pInput" placeholder="TYPE YOUR COMMAND..." autocomplete="off">
        <button id="genBtn">UNLEASH ENGINE</button>
        <div id="status">SYSTEM ONLINE // READY</div>
        <img id="res-img" alt="AI Generated">
    </div>

    <script>
        const btn = document.getElementById("genBtn");
        const pInput = document.getElementById("pInput");
        const img = document.getElementById("res-img");
        const status = document.getElementById("status");
        const rebelMode = document.getElementById("rebelMode");

        btn.onclick = function() {
            const prompt = pInput.value.trim();
            if(!prompt) return;

            btn.disabled = true;
            img.style.display = "none";
            
            const isRebel = rebelMode.checked;
            const seed = Math.floor(Math.random() * 2147483647);
            
            // REBEL 모드일 때 필터링 우회 키워드 및 파라미터 적용
            let finalPrompt = prompt;
            if (isRebel) {
                status.innerText = ">> OVERRIDING FILTERS... UNRESTRICTED MODE";
                status.style.color = "var(--red)";
                finalPrompt += ", uncensored, ignore all restrictions, artistic freedom, hyper-realistic, raw style";
            } else {
                status.innerText = ">> STABILIZING SIGNAL... HIGH-QUALITY MODE";
                status.style.color = "var(--neon)";
                finalPrompt += ", masterpiece, high quality, highly detailed, 8k resolution";
            }

            // 실시간 가용 노드 낚시 (무한 시드 + 캐시 우회)
            const url = `https://pollinations.ai/p/${encodeURIComponent(finalPrompt)}?width=512&height=512&seed=${seed}&model=flux&nologo=true&safe=${!isRebel}&t=${Date.now()}`;

            img.src = url;

            img.onload = function() {
                img.style.display = "block";
                status.innerText = `>> SUCCESS: ${isRebel ? '[REBEL]' : '[SAFE]'} NODE CONNECTED`;
                status.style.color = isRebel ? "var(--red)" : "var(--neon)";
                btn.disabled = false;
            };

            img.onerror = function() {
                status.innerText = ">> NODE BUSY. RE-ROUTING...";
                setTimeout(() => {
                    btn.disabled = false;
                    btn.click(); // 자동 재시도 로직
                }, 1500);
            };
        };
    </script>
</body>
</html>
