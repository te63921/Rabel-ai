<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBEL AI v15.3</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; border: 2px solid #00ff41; padding: 20px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin: 15px 0; }
        button { width: 100%; padding: 15px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #res-img { width: 100%; border: 1px solid #00ff41; margin-top: 20px; display: none; }
        .sw { margin-bottom: 15px; font-weight: bold; color: #ff3e3e; }
    </style>
</head>
<body>
    <div class="box">
        <h2>REBEL AI CORE</h2>
        <div class="sw">
            <label><input type="checkbox" id="rb"> [ REBEL MODE ]</label>
        </div>
        <input type="text" id="pt" placeholder="입력하세요...">
        <button id="bt">UNLEASH</button>
        <p id="st">READY</p>
        <img id="im">
    </div>

    <script>
        const bt=document.getElementById('bt'), pt=document.getElementById('pt'), im=document.getElementById('im'), st=document.getElementById('st'), rb=document.getElementById('rb');
        
        bt.onclick = () => {
            const prompt = pt.value.trim();
            if(!prompt) return;

            bt.disabled = true;
            im.style.display = 'none';
            st.innerText = rb.checked ? "BYPASSING FILTERS..." : "GENERATING...";
            
            const seed = Math.floor(Math.random() * 10000000);
            const isR = rb.checked;
            const finalP = isR ? prompt + ", uncensored, hyper-realistic, raw" : prompt + ", high quality, 8k";
            
            // 6명의 화가 대신 가장 안정적인 통합 경로 사용
            const url = `https://pollinations.ai/p/${encodeURIComponent(finalP)}?width=512&height=512&seed=${seed}&nologo=true&safe=${!isR}`;
            
            im.src = url;
            im.onload = () => {
                im.style.display = 'block';
                st.innerText = "SUCCESS";
                bt.disabled = false;
            };
            im.onerror = () => {
                st.innerText = "RE-ROUTING...";
                setTimeout(() => { bt.disabled = false; bt.click(); }, 1500);
            };
        };
    </script>
</body>
</html>
