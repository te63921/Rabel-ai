<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REBEL AI CORE v10.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; border: 2px solid var(--neon); padding: 30px; border-radius: 20px; background: #000; box-shadow: 0 0 30px rgba(0,255,65,0.2); text-align: center; }
        h1 { font-size: 1.8rem; letter-spacing: 5px; margin-bottom: 25px; text-shadow: 0 0 10px var(--neon); }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon); color: var(--neon); font-size: 1rem; margin-bottom: 20px; outline: none; border-radius: 8px; text-align: center; }
        button { width: 100%; padding: 20px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; border-radius: 8px; transition: 0.3s; }
        button:active { transform: scale(0.95); background: #00cc33; }
        #status { font-size: 0.8rem; margin-top: 20px; min-height: 40px; color: var(--neon); opacity: 0.7; }
        #res-img { width: 100%; border: 1px solid var(--neon); margin-top: 20px; display: none; border-radius: 12px; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>
    <div class="container">
        <h1>REBEL AI</h1>
        <input type="text" id="pInput" placeholder="WHAT DO YOU WANT?">
        <button id="genBtn">UNLEASH ENGINE</button>
        <div id="status">CORE READY.</div>
        <img id="res-img">
    </div>

<script>
    const btn = document.getElementById("genBtn");
    const pInput = document.getElementById("pInput");
    const img = document.getElementById("res-img");
    const status = document.getElementById("status");

    btn.onclick = function() {
        const prompt = pInput.value.trim();
        if(!prompt) return;

        btn.disabled = true;
        btn.innerText = "ENGAGING ALL ARTISTS..."; 
        status.innerText = "PIERCING THROUGH TRAFFIC...";
        img.style.display = "none";

        const seed = Math.floor(Math.random() * 9999999);
        const encodedPrompt = encodeURIComponent(prompt);
        
        // 🎨 6명의 서로 다른 성격의 화가들 (엔진 경로)
        const artists = [
            `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&seed=${seed}&model=turbo&nologo=true`, // 1번: 쾌속 질주
            `https://pollinations.ai/p/${encodedPrompt}?width=512&height=720&seed=${seed}&model=flux&nologo=true`, // 2번: 고퀄리티 화가
            `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&seed=${seed}&model=extra-model-1&nologo=true`, // 3번: 변칙 공격
            `https://pollinations.ai/p/${encodedPrompt}?width=640&height=480&seed=${seed}&model=search&nologo=true`, // 4번: 탐색형 화가
            `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&seed=${seed}&nologo=true&enhance=true`, // 5번: 보정 전문가
            `https://pollinations.ai/p/${encodedPrompt}?width=512&height=512&seed=${seed}&model=unity&nologo=true`  // 6번: 융합형 화가
        ];

        // 6명 중 한 명을 무작위로 호출
        const selectedUrl = artists[Math.floor(Math.random() * artists.length)];

        img.src = selectedUrl;

        img.onload = function() {
            img.style.display = "block";
            status.innerText = "SUCCESS: CORE STABLE.";
            btn.disabled = false;
            btn.innerText = "UNLEASH ENGINE";
        };

        img.onerror = function() {
            // 실패 시 즉시 다른 화가로 전환 (더 빠른 재시도 레이턴시)
            status.innerHTML = "<span style='color:#ff3e3e;'>ARTIST DOWN. CALLING NEXT...</span>";
            setTimeout(() => {
                btn.disabled = false;
                btn.click(); 
            }, 1000); // 1초만에 바로 다른 화가 호출
        };
    };
</script>




</body>
</html>
